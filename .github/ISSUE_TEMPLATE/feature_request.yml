name: 💡 기능 제안 (Feature request)
description: 새로운 기능이나 개선 아이디어를 제안합니다 / Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        한국어 또는 영어로 자유롭게 작성해주세요. / Feel free to write in Korean or English.
        자유로운 의견·토론은 [Discussions](../../discussions)를 이용해주세요. / For open-ended ideas, please use Discussions.
  - type: textarea
    id: problem
    attributes:
      label: 어떤 문제·필요에서 출발했나요? (Motivation)
      description: 이 기능이 왜 필요한지, 어떤 상황에서 아쉬웠는지 설명해주세요. / What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안하는 기능 (Proposed feature)
      description: 어떻게 동작했으면 하나요? / Describe how it should work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 대안·참고 (Alternatives / references)
      description: 고려한 다른 방법이나 참고할 자료가 있다면 적어주세요. / Any alternatives or references.
