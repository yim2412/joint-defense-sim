<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D 전장</title>
  <!-- Cesium CDN (jsDelivr, 메이저 1 최신). 온라인 의존 — 인터넷 필요 -->
  <script>window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1/Build/Cesium/';</script>
  <script src="https://cdn.jsdelivr.net/npm/cesium@1/Build/Cesium/Cesium.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/cesium@1/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background: #0b1a2b; }
    /* 진단 오버레이 — 본 통합: 화면 비표시(콘솔 로그는 유지). 디버깅 시 display:block */
    #diag {
      display: none;
      position: absolute; top: 8px; left: 8px; z-index: 9999;
      font: 13px/1.5 'Consolas', monospace; color: #9fe6a0;
      background: rgba(0,0,0,0.55); padding: 8px 10px; border-radius: 6px;
      max-width: 60%; white-space: pre-wrap; pointer-events: none;
    }
    #diag .err { color: #ff6b6b; }
    #counter {
      position: absolute; top: 10px; right: 12px; z-index: 9999; display: none;
      font: 13px/1.6 'Malgun Gothic', sans-serif; color: #e6eef7;
      background: rgba(10,22,40,0.72); padding: 10px 14px; border-radius: 8px;
      border: 1px solid rgba(120,170,255,0.35); pointer-events: none; min-width: 116px;
    }
    #counter b { color: #ffd166; font-size: 15px; }
    #covtoggle {
      position: absolute; top: 10px; left: 12px; z-index: 9999; display: none;
      font: 13px 'Malgun Gothic', sans-serif; color: #e6eef7;
      background: rgba(10,22,40,0.72); padding: 8px 12px; border-radius: 8px;
      border: 1px solid rgba(120,170,255,0.35); user-select: none;
    }
    #covtoggle label { cursor: pointer; display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>
  <div id="diag"></div>
  <div id="counter"></div>
  <div id="covtoggle"><label><input type="checkbox" id="covchk" checked> 방어 커버리지 표시</label></div>
  <script>
    const diag = document.getElementById('diag');
    function log(msg, isErr) {
      const span = document.createElement('span');
      if (isErr) span.className = 'err';
      span.textContent = msg + '\n';
      diag.appendChild(span);
      (isErr ? console.error : console.log)('[CESIUM-POC] ' + msg);
    }
    window.onerror = function (m, s, l, c) { log('JS ERROR: ' + m + ' @' + l + ':' + c, true); };

    try {
      if (typeof Cesium === 'undefined') {
        log('Cesium 라이브러리 로드 실패 — CDN/네트워크 확인', true);
      } else {
        log('Cesium ' + Cesium.VERSION + ' 로드됨');
        // 파이썬이 __CESIUM_ION_TOKEN__ 자리에 토큰 주입. 비어 있으면 위성영상만 미표시(지구본은 뜸).
        const token = '__CESIUM_ION_TOKEN__';
        if (token && token.length > 10) {
          Cesium.Ion.defaultAccessToken = token;
          log('토큰 적용됨 (위성영상·지형 사용)');
        } else {
          log('토큰 없음 — 기본 지구본만 표시 (cesium_token.txt 확인)', true);
        }

        const viewer = new Cesium.Viewer('cesiumContainer', {
          timeline: true, animation: true, baseLayerPicker: false,
          geocoder: false, homeButton: false, sceneModePicker: false,
          navigationHelpButton: false, fullscreenButton: false,
        });
        log('Viewer 생성 성공 (WebGL OK)');

        // 한반도 동해 중부(_REGION_REF 기본값)로 카메라 이동 — 실제 좌표계 확인
        viewer.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(131.9, 37.2, 1_200_000.0),
          duration: 2.0,
        });
        log('카메라 → 한반도 동해 중부 (37.2N, 131.9E)');

        // 파이썬이 시뮬 결과를 CZML로 주입하는 통로
        window._viewer = viewer;
        // 발수 카운터 — 시각별 위협 미사일 집계(발사/비행중/처리됨)
        let _counterTick = null;
        function _setupCounter(src) {
          const tt = (src[0] && src[0]._threatTimes) || [];
          const el = document.getElementById('counter');
          const clock = viewer.clock;
          if (_counterTick) clock.onTick.removeEventListener(_counterTick);
          if (!tt.length) { el.style.display = 'none'; return; }
          el.style.display = 'block';
          _counterTick = function () {
            const t = Cesium.JulianDate.secondsDifference(clock.currentTime, clock.startTime);
            let fired = 0, flying = 0, done = 0;
            for (let k = 0; k < tt.length; k++) {
              if (t >= tt[k][0]) { fired++; if (t <= tt[k][1] + 0.001) flying++; else done++; }
            }
            el.innerHTML = '위협 발사 <b>' + fired + '</b><br>비행 중 <b>' + flying +
                           '</b><br>처리됨 <b>' + done + '</b>';
          };
          clock.onTick.addEventListener(_counterTick);
          _counterTick();
        }

        // 커버리지 돔 ON/OFF — coverage/* 엔티티 일괄 토글
        let _covDs = null;
        function _applyCoverage(show) {
          if (!_covDs) return;
          const ents = _covDs.entities.values;
          for (let i = 0; i < ents.length; i++) {
            if (ents[i].id && ents[i].id.indexOf('coverage/') === 0) ents[i].show = show;
          }
        }
        const _covChk = document.getElementById('covchk');
        _covChk.addEventListener('change', function () { _applyCoverage(_covChk.checked); });

        window.loadCzml = function (czml) {
          try {
            const src = (typeof czml === 'string') ? JSON.parse(czml) : czml;
            Cesium.CzmlDataSource.load(src).then(function (ds) {
              viewer.dataSources.removeAll();
              viewer.dataSources.add(ds);
              viewer.clock.shouldAnimate = true;
              viewer.flyTo(ds, { duration: 1.5 });
              _setupCounter(src);
              // 커버리지 패킷 유무로 토글 노출 + 현재 체크 상태 반영
              _covDs = ds;
              const hasCov = ds.entities.values.some(function (e) {
                return e.id && e.id.indexOf('coverage/') === 0; });
              document.getElementById('covtoggle').style.display = hasCov ? 'block' : 'none';
              if (hasCov) _applyCoverage(_covChk.checked);
              log('CZML 로드 성공: ' + src.length + ' 패킷');
            }).catch(function (e) { log('CZML 로드 실패: ' + e, true); });
          } catch (e) { log('CZML 파싱 실패: ' + e, true); }
        };
      }
    } catch (e) {
      log('EXCEPTION: ' + (e && e.message ? e.message : e), true);
    }
  </script>
</body>
</html>
